<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sign Language Detection</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:#111827;
            color:white;
            text-align:center;
        }

        video{
            width:700px;
            max-width:95%;
            border-radius:20px;
            border:5px solid #9333ea;
            margin-top:20px;
        }

        .result{
            margin-top:20px;
            font-size:35px;
            font-weight:bold;
        }

        .confidence{
            font-size:22px;
            color:#cbd5e1;
        }

        .controls button{
            margin:5px;
        }

        img{
            margin-top:20px;
            border-radius:15px;
        }

    </style>

</head>

<body>

    <div class="container mt-4">

        <h1>🖐 Sign Language Detection</h1>

        <video
            id="video"
            autoplay
            playsinline
        ></video>

        <canvas
            id="canvas"
            style="display:none;"
        ></canvas>

        <div
            class="result"
            id="letter"
        >
            Waiting...
        </div>

        <div
            class="confidence"
            id="confidence"
        >
        </div>

        <img
            src="{{ url_for('static', filename='Images/Sign.jpg') }}"
            width="500"
            height="400"
        >

        <div class="controls mt-4">

            <button
                onclick="addLetter()"
                class="btn btn-success"
            >
                Add Letter
            </button>

            <button
                onclick="undoLetter()"
                class="btn btn-warning"
            >
                Undo
            </button>

            <button
                onclick="resetWord()"
                class="btn btn-danger"
            >
                Reset
            </button>

            <button
                onclick="speakWord()"
                class="btn btn-info"
            >
                Speak
            </button>

        </div>

        <h3 class="mt-3">
            Word :
            <span
                id="displayWord"
                class="text-info"
            >
                ...
            </span>
        </h3>

    </div>

    <script>

        const video = document.getElementById('video');

        const canvas = document.getElementById('canvas');

        const letterDiv = document.getElementById('letter');

        const confidenceDiv = document.getElementById('confidence');


        async function startCamera(){

            const stream =
                await navigator.mediaDevices.getUserMedia({
                    video:true
                });

            video.srcObject = stream;
        }


        async function predictFrame(){

            if(video.videoWidth === 0){
                return;
            }

            canvas.width = video.videoWidth;

            canvas.height = video.videoHeight;

            const ctx = canvas.getContext('2d');

            ctx.drawImage(
                video,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const image = canvas.toDataURL('image/jpeg');

            const response = await fetch('/predict',{

                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({
                    image:image
                })

            });

            const data = await response.json();

            if(data.success){

                letterDiv.innerHTML =
                    `Letter : ${data.letter}`;

                confidenceDiv.innerHTML =
                    `Confidence : ${Math.round(data.confidence * 100)}%`;

            }else{

                letterDiv.innerHTML =
                    "No Hand Detected";

                confidenceDiv.innerHTML = "";
            }
        }


        function updateWord(){

            fetch('/get_word')
            .then(res => res.json())
            .then(data => {

                document.getElementById(
                    'displayWord'
                ).textContent = data.word;

            });

        }


        function addLetter(){

            fetch('/add_letter',{
                method:'POST'
            }).then(updateWord);

        }


        function undoLetter(){

            fetch('/undo_letter',{
                method:'POST'
            }).then(updateWord);

        }


        function resetWord(){

            fetch('/reset',{
                method:'POST'
            }).then(updateWord);

        }


        function speakWord(){

            fetch('/get_word')
            .then(res => res.json())
            .then(data => {

                const msg =
                    new SpeechSynthesisUtterance(
                        data.word
                    );

                window.speechSynthesis.speak(msg);

            });

        }


        document.addEventListener(
            'keydown',
            function(event){

                const key =
                    event.key.toLowerCase();

                if(key === 'a') addLetter();

                if(key === 'u') undoLetter();

                if(key === 'r') resetWord();

                if(key === 's') speakWord();

            }
        );


        startCamera();

        setInterval(predictFrame, 800);

        setInterval(updateWord, 1000);

    </script>

</body>

</html>
